<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minigolf RL · Grid</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #111;
        color: #ddd;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      header {
        padding: 8px 16px;
        background: #1a1a1a;
        border-bottom: 1px solid #2a2a2a;
        display: flex;
        gap: 16px;
        align-items: center;
        font-size: 13px;
        flex-wrap: wrap;
      }
      header h1 { font-size: 14px; margin: 0; font-weight: 600; }
      header a { color: #6cf; text-decoration: none; }
      header a:hover { text-decoration: underline; }
      header .stat { color: #9aa; }
      header .stat b {
        color: #fff;
        font-variant-numeric: tabular-nums;
        display: inline-block;
        min-width: 2ch;
        text-align: left;
      }
      header .right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
      main {
        flex: 1;
        padding: 12px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 12px;
      }
      .cell {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .cell-head {
        padding: 6px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: #15151a;
        border-bottom: 1px solid #2a2a2a;
        font-size: 12px;
      }
      .cell-name { font-weight: 600; color: #fff; flex: 1; }
      .cell-remove {
        background: transparent;
        border: 1px solid #444;
        color: #aaa;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        cursor: pointer;
        line-height: 1;
      }
      .cell-remove:hover { background: #4a1a1a; color: #fff; border-color: #aa4040; }
      .cell canvas {
        display: block;
        background: #000;
        image-rendering: pixelated;
        width: 100%;
        height: auto;
        aspect-ratio: 735 / 375;
      }
      .cell-stats {
        padding: 6px 10px;
        font-size: 11px;
        color: #9aa;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .cell-stats b {
        color: #fff;
        font-variant-numeric: tabular-nums;
        display: inline-block;
        min-width: 2ch;
        text-align: left;
      }
      .status {
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .status.training  { background: #2a2a2a; color: #888; }
      .status.converging { background: #3a3015; color: #ffd24f; }
      .status.converged { background: #15301f; color: #7fffaa; }
      .status.perfected { background: #15301f; color: #7fffaa; }
      .status.loaded    { background: #1f2240; color: #b0bcff; }
      .cell-meta {
        padding: 6px 10px 8px;
        border-top: 1px solid #2a2a2a;
        background: #15151a;
        font-size: 10.5px;
        color: #aab;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 2px 10px;
      }
      .cell-meta .meta-label { color: #788; margin-right: 4px; }
      .cell-meta b {
        color: #fff;
        font-variant-numeric: tabular-nums;
      }
      input[type="range"] {
        background: #1a1a1a;
        color: #ddd;
        font-family: inherit;
      }
      button {
        background: #2a2a2a;
        color: #fff;
        border: 1px solid #3a3a3a;
        padding: 4px 10px;
        font-family: inherit;
        font-size: 11px;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover { background: #3a3a3a; }
    </style>
  </head>
  <body>
    <header>
      <h1>minigolf · RL · grid</h1>
      <a href="/">← single-map view</a>
      <div class="stat">solved: <b id="solved-count">0</b>/<b id="total-count">0</b></div>
      <div class="stat">total episodes: <b id="total-episodes">0</b></div>
      <div class="right">
        <select id="grid-add-map" style="max-width:240px;background:#1a1a1a;color:#ddd;border:1px solid #3a3a3a;padding:4px;font-family:inherit;font-size:11px;"></select>
        <button id="grid-add-btn" title="Add the selected map to the grid">+ add</button>
        <button id="grid-reset-curated" title="Replace the grid with the curated 6">curated 6</button>
        <button id="grid-clear-all" title="Remove every cell from the grid">clear</button>
        <label for="grid-speed" style="font-size:12px;color:#9aa;">speed: <b id="grid-speed-label" style="color:#fff;font-variant-numeric:tabular-nums;display:inline-block;min-width:5ch;text-align:left;">30</b></label>
        <input type="range" id="grid-speed" min="3" max="5000" value="30" style="width:200px;" />
        <button id="grid-clear">delete saved policies</button>
      </div>
    </header>
    <main id="grid"></main>
    <script type="module" src="/src/grid.ts"></script>
  </body>
</html>
