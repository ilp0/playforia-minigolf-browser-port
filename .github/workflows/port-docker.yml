name: Port Docker Image

on:
  push:
    branches: [master, beta]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build, smoke test, and push port image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (load to local daemon for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: port/Dockerfile
          load: true
          tags: port-smoke:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Smoke test image
        run: |
          docker run --rm -d -p 4242:4242 --name golf port-smoke:ci
          ok=0
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:4242/ > /dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          echo "--- container logs ---"
          docker logs golf || true
          if [ "$ok" != "1" ]; then
            docker stop golf || true
            echo "smoke test failed: server did not respond on port 4242"
            exit 1
          fi
          if ! curl -fsS http://localhost:4242/ | grep -qi '<html\|<!doctype'; then
            docker stop golf || true
            echo "smoke test failed: index.html did not look like HTML"
            exit 1
          fi
          docker stop golf

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: port/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          platforms: linux/amd64
